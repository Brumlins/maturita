<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maturita 2025</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --border: #2a2d3a;
      --accent1: #7c6af7;
      --accent2: #3ecf8e;
      --text: #e8eaf0;
      --muted: #6b7280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
      z-index: 0;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      z-index: 0;
    }
    .glow-1 { background: var(--accent1); top: -200px; left: -100px; }
    .glow-2 { background: var(--accent2); bottom: -200px; right: -100px; }

    main {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent2);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, var(--muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 4rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .buttons {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 2rem 2.5rem;
      width: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 16px;
    }

    .btn-prakticke::before { background: linear-gradient(135deg, rgba(124,106,247,0.15), transparent); }
    .btn-ustni::before { background: linear-gradient(135deg, rgba(62,207,142,0.15), transparent); }

    .btn:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.15); }
    .btn:hover::before { opacity: 1; }

    .btn-prakticke:hover { box-shadow: 0 20px 60px rgba(124,106,247,0.2); }
    .btn-ustni:hover { box-shadow: 0 20px 60px rgba(62,207,142,0.2); }

    .btn-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .btn-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .btn-desc {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      text-align: left;
      line-height: 1.5;
    }

    .btn-arrow {
      position: absolute;
      bottom: 1.5rem;
      right: 1.5rem;
      font-size: 1.2rem;
      opacity: 0.3;
      transition: opacity 0.3s, transform 0.3s;
    }
    .btn:hover .btn-arrow { opacity: 1; transform: translate(3px, -3px); }

    .btn-disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 999px;
      margin-bottom: 0.8rem;
    }
    .tag-active { background: rgba(124,106,247,0.2); color: var(--accent1); border: 1px solid rgba(124,106,247,0.3); }
    .tag-wip { background: rgba(107,114,128,0.2); color: var(--muted); border: 1px solid rgba(107,114,128,0.3); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <main>
    <p class="label">// maturita 2025</p>
    <h1>Studijní<br>materiály</h1>
    <p class="subtitle">IT škola &nbsp;·&nbsp; Brumlins</p>

    <div class="buttons">
      <a href="prakticke/" class="btn btn-prakticke">
        <span class="tag tag-active">dostupné</span>
        <div class="btn-icon">⌨️</div>
        <div class="btn-title">Praktické</div>
        <div class="btn-desc">SQL · C++ · Grušman</div>
        <span class="btn-arrow">↗</span>
      </a>

      <a class="btn btn-ustni btn-disabled">
        <span class="tag tag-wip">brzy</span>
        <div class="btn-icon">📖</div>
        <div class="btn-title">Ústní</div>
        <div class="btn-desc">teorie · otázky · pojmy</div>
        <span class="btn-arrow">↗</span>
      </a>
    </div>
  </main>
</body>
</html>
