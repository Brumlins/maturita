<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ústní | Maturita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/base.css">
<style>
.glow{position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(100px);opacity:.1;z-index:0;}
.glow-1{background:#7c6af7;top:-200px;left:-100px;}
.glow-2{background:#3ecf8e;bottom:-200px;right:-100px;}
main{position:relative;z-index:1;text-align:center;padding:2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
.back{position:fixed;top:1.2rem;left:1.5rem;z-index:10;
  font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--muted);
  text-decoration:none;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:.4rem .9rem;transition:all .2s;}
.back:hover{color:var(--text);border-color:rgba(255,255,255,.15);}
.label{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--accent2);letter-spacing:.2em;text-transform:uppercase;margin-bottom:1.2rem;}
h1{font-size:clamp(2.5rem,7vw,5rem);font-weight:800;line-height:1;margin-bottom:.4rem;
  background:linear-gradient(135deg,#fff 0%,var(--muted) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:3.5rem;font-family:'JetBrains Mono',monospace;}
.buttons{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;}
.btn{position:relative;display:flex;flex-direction:column;align-items:flex-start;
  padding:2rem 2.5rem;width:260px;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;text-decoration:none;color:var(--text);transition:all .3s;overflow:hidden;}
.btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:16px;}
.btn-mikes::before{background:linear-gradient(135deg,rgba(124,106,247,.15),transparent);}
.btn-lucny::before{background:linear-gradient(135deg,rgba(245,158,11,.15),transparent);}
.btn:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.12);}
.btn:hover::before{opacity:1;}
.btn-mikes:hover{box-shadow:0 20px 60px rgba(124,106,247,.2);}
.btn-lucny:hover{box-shadow:0 20px 60px rgba(245,158,11,.15);}
.btn-disabled{opacity:.4;cursor:not-allowed;pointer-events:none;}
.btn-icon{font-size:2rem;margin-bottom:1rem;}
.btn-title{font-size:1.4rem;font-weight:700;margin-bottom:.4rem;}
.btn-desc{font-size:.78rem;color:var(--muted);font-family:'JetBrains Mono',monospace;text-align:left;line-height:1.5;}
.btn-arrow{position:absolute;bottom:1.5rem;right:1.5rem;font-size:1.2rem;opacity:.3;transition:opacity .3s,transform .3s;}
.btn:hover .btn-arrow{opacity:1;transform:translate(3px,-3px);}
.tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.65rem;
  padding:2px 8px;border-radius:999px;margin-bottom:.8rem;}
.tag-active{background:rgba(124,106,247,.2);color:var(--accent);border:1px solid rgba(124,106,247,.3);}
.tag-wip{background:rgba(107,114,128,.2);color:var(--muted);border:1px solid rgba(107,114,128,.3);}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<a class="back" href="../index.html">← zpět</a>
<main>
  <p class="label">// ústní zkouška</p>
  <h1>Vyber<br>kategorii</h1>
  <p class="subtitle">maturita 2025 &nbsp;·&nbsp; Brumlins</p>
  <div class="buttons">
    <a href="../ustni/Mikes+Marcel/index.html" class="btn btn-mikes">
      <span class="tag tag-active">dostupné</span>
      <div class="btn-icon">🖥️</div>
      <div class="btn-title">Mikes + Marcel</div>
      <div class="btn-desc">OS · Sítě · Skripty · HW</div>
      <span class="btn-arrow">↗</span>
    </a>
    <a class="btn btn-lucny btn-disabled">
      <span class="tag tag-wip">brzy</span>
      <div class="btn-icon">📚</div>
      <div class="btn-title">Lučný</div>
      <div class="btn-desc">teorie · otázky · pojmy</div>
      <span class="btn-arrow">↗</span>
    </a>
  </div>
</main>
</body>
</html>
